backend:
  name: github
  repo: marcus-d-cloud/chess-hugo-decap
  branch: main

media_folder: "static/images"
public_folder: "/images"

collections:
  - name: "news"
    label: "News"
    folder: "content/news"
    create: true
    slug: "{{slug}}"

    fields:
      - {label: "Titel", name: "title", widget: "string"}
      - {label: "Datum", name: "date", widget: "datetime"}
      - {label: "Inhalt", name: "body", widget: "markdown"}